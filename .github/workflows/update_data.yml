name: Atualizar dados ANP diariamente

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests pandas openpyxl

      - name: Baixar e processar dados da ANP
        run: python src/fetch_anp.py

      - name: Commit e push se houver dados novos
        run: |
          git config user.name "ANP Bot"
          git config user.email "anp-bot@noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "Dados ANP atualizados: $(date '+%d/%m/%Y %H:%M')" && git push)
