name: ANP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - run: git pull --rebase origin main || git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests pandas openpyxl

      - run: python src/fetch_anp.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Dados ANP atualizados
          file_pattern: data/
          push_options: '--force'
